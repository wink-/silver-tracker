name: Fetch COMEX Precious Metals Inventory

on:
  schedule:
    # 03:00 UTC = 11pm ET — after CME typically posts daily data (Tuesday through Saturday)
    - cron: "0 3 * * 2-6"
  workflow_dispatch:  # allow manual trigger for testing

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit and push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests xlrd

      - name: Fetch silver inventory
        run: python scripts/fetch_metal.py --metal silver

      - name: Fetch gold inventory
        run: python scripts/fetch_metal.py --metal gold

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data to commit."
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "data: add precious metals inventory for ${DATE}"
            git push
          fi
