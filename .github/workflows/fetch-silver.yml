name: Fetch COMEX Silver Inventory

on:
  schedule:
    # 23:00 UTC = 6pm ET — after CME typically posts daily data (weekdays only)
    - cron: "0 23 * * 1-5"
  workflow_dispatch:  # allow manual trigger for testing

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit and push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests xlrd

      - name: Fetch and parse silver data
        run: python scripts/fetch_silver.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/inventory.json data/archives/
          # Only commit if there are staged changes
          if git diff --cached --quiet; then
            echo "No new data to commit."
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "data: add silver inventory for ${DATE}"
            git push
          fi
